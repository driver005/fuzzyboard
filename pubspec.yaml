name: fuzzyboard
description: A responsive workflow engine dashboard built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Routing
  go_router: ^17.2.3

  # Animations
  flutter_animate: ^4.5.0

  # Charts
  fl_chart: ^1.2.0

  # Persistence
  shared_preferences: ^2.2.3

  # Typography
  google_fonts: ^8.1.0

  # Unique IDs
  uuid: ^4.4.0

  # Color picker
  flutter_colorpicker: ^1.1.0

  # Icons (cupertino + material)
  cupertino_icons: ^1.0.6

  # i18n
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
